      }

                                title={name}
                                className="flex items-center gap-2 px-3 py-2 rounded-xl font-bold text-[11px] tracking-wide transition-all hover:scale-105 active:scale-95"

                                  background: 'rgba(255,255,255,0.07)',

                        Скиллы
                      </h2>
                      <div className="grid grid-cols-1 gap-6">
                        {Object.entries(mainSkillsGrouped).map(
                          ([level, skills]) => (
                            <div key={level}>
                              <h3 className="text-[10px] uppercase tracking-widest text-muted-color mb-2 font-black">
                                {level}
                              </h3>
                              <div className="flex flex-wrap gap-2">
                                {skills.map((s) => (
                                  <span
                                    key={s}
                                    className="px-3 py-1 bg-white/50 dark:bg-slate-800/50 border border-glass-border rounded-lg text-[10px] md:text-xs font-bold shadow-sm"
                                  >
                                    {s}
                                  </span>
                                ))}
                              </div>
                            </div>
                          )
                        )}
                      </div>
                    </div>

                    <div className="glass p-6 md:p-8 rounded-3xl md:col-span-1">
                      <h2 className="text-2xl md:text-3xl font-black mb-6 md:mb-8 uppercase tracking-tight">
                        Доп. скиллы
                      </h2>
                      <div className="grid grid-cols-1 gap-6">
                        {Object.entries(extraSkillsGrouped).map(
                          ([level, skills]) => (
                            <div key={level}>
                              <h3 className="text-[10px] uppercase tracking-widest text-muted-color mb-2 font-black">
                                {level}
                              </h3>
                              <div className="flex flex-wrap gap-2">
                                {skills.map((s) => (
                                  <span
                                    key={s}
                                    className="px-3 py-1 bg-white/50 dark:bg-slate-800/50 border border-glass-border rounded-lg text-[10px] md:text-xs font-bold shadow-sm"
                                  >
                                    {s}
                                  </span>
                                ))}
                              </div>
                            </div>
                          )
                        )}
                      </div>
                    </div>

                    <div className="glass p-6 md:p-8 rounded-3xl md:col-span-1">
                      <h2 className="text-2xl md:text-3xl font-black mb-6 md:mb-8 uppercase tracking-tight">
                        Инструменты
                      </h2>
                      <div className="flex flex-wrap gap-2 md:gap-3">
                        {instruments.map((s) => (
                          <span
                            key={s}
                            className="px-3 py-1.5 bg-white/50 dark:bg-slate-800/50 border border-glass-border rounded-lg text-[10px] md:text-xs font-bold shadow-sm"
                          >
                            {s}
                          </span>
                        ))}
                      </div>
                    </div>
                  </motion.section>
                )}

                {activeTab === 'services' && (
                  <motion.section
                    key="services"
                    initial={{ opacity: 0 }}
                    animate={{ opacity: 1 }}
                    className="max-w-4xl mx-auto w-full"
                  >
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                      <h2 className="text-2xl font-black uppercase">Услуги</h2>
                      <button
                        onClick={() => setActiveTab('portfolio')}
                        className="text-muted-color hover:text-main-color transition-all flex items-center gap-2 text-[10px] font-black uppercase tracking-widest group"
                      >
                        <i data-lucide="folder-open" size="16"></i>{' '}
                        <span>ПОРТФОЛИО</span>
                      </button>
                    </div>
                    <div className="grid gap-4">
                      {services.map((s) => (
                        <div
                          key={s.id}
                          className="glass p-6 rounded-3xl flex flex-col md:flex-row justify-between items-start md:items-center hover:bg-white/80 dark:hover:bg-slate-800/60 transition-all group gap-6"
                        >
                          <div className="flex-grow">
                            <h3 className="font-black text-sm md:text-lg uppercase tracking-tight">
                              {s.title}
                            </h3>
                            <p className="text-muted-color text-[10px] md:text-xs mt-2 mb-3 leading-relaxed font-medium">
                              {s.description}
                            </p>
                            <p className="font-black text-[10px] md:text-xs uppercase tracking-wider">
                              {s.price}
                            </p>
                          </div>
                          <div className="flex flex-col sm:flex-row gap-2 w-full md:w-auto">
                            <a
                              href={`mailto:frozenjuggernaut@gmail.com?subject=Заказ услуги: ${encodeURIComponent(s.title)}`}
                              className="flex-1 md:flex-none text-center btn-outline px-4 py-3 rounded-xl font-black text-[9px] hover:opacity-80 transition-all uppercase shadow-sm"
                            >
                              Email
                            </a>
                            <a
                              href="https://t.me/balenciaga_telegram"
                              target="_blank"
                              className="flex-1 md:flex-none text-center btn-primary px-4 py-3 rounded-xl font-black text-[9px] hover:opacity-90 transition-all uppercase shadow-md"
                            >
                              Telegram
                            </a>
                          </div>
                        </div>
                      ))}
                    </div>
                  </motion.section>
                )}

                {activeTab === 'portfolio' && (
                  <motion.section
                    key="portfolio"
                    initial={{ opacity: 0, scale: 0.95 }}
                    animate={{ opacity: 1, scale: 1 }}
                    className="grid md:grid-cols-2 gap-4 md:gap-6"
                  >
                    {repos.map((repo, i) => (
                      <a
                        key={i}
                        href={repo.url}
                        target="_blank"
                        className="glass p-6 md:p-8 rounded-[2rem] hover:border-slate-400 transition-all group flex flex-col justify-between min-h-[180px]"
                      >
                        <div>
                          <div className="flex justify-between items-start mb-4">
                            <i
                              data-lucide="folder-git-2"
                              className="text-muted-color"
                            ></i>
                            <i
                              data-lucide="external-link"
                              size="18"
                              className="text-muted-color group-hover:text-main-color"
                            ></i>
                          </div>
                          <h3 className="text-lg md:text-xl font-black mb-2 uppercase">
                            {repo.name}
                          </h3>
                          <p className="text-muted-color text-[10px] md:text-xs leading-relaxed font-medium">
                            {repo.desc}
                          </p>
                        </div>
                        <div className="mt-6 flex items-center gap-2">
                          <div className="h-[1px] flex-grow bg-glass-border"></div>
                          <span className="text-[9px] font-black text-muted-color px-3 py-1 bg-white/30 dark:bg-black/20 rounded-lg">
                            {repo.stack}
                          </span>
                        </div>
                      </a>
                    ))}
                  </motion.section>
                )}
              </AnimatePresence>
            </main>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
